<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }
        .box {
            background: white;
            color: black;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 70%;
            padding: 10px;
        }
        button {
            padding: 10px;
        }
        li {
            list-style: none;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>📝 Notes App</h1>

<div class="box">
    <form action="/add" method="post">
        <input type="text" name="note" placeholder="Write a note">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for note in notes %}
            <li>
                {{ note }}
                <a href="/delete/{{ loop.index0 }}">❌</a>
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
